{% load i18n %}
<div class="card h-100 border-0 shadow-sm product-card">
    <a href="{% url 'products:detail' product.slug %}">
        {% with product.get_main_image as img %}
        {% if img %}
        <img src="{{ img.image.url }}" class="card-img-top" alt="{{ product.name }}" style="height:220px; object-fit:cover;">
        {% else %}
        <div class="bg-light d-flex align-items-center justify-content-center" style="height:220px;">
            <span style="font-size:3rem;">👜</span>
        </div>
        {% endif %}
        {% endwith %}
    </a>
    <div class="card-body">
        <h6 class="card-title">
            <a href="{% url 'products:detail' product.slug %}" class="text-decoration-none text-dark">
                {{ product.name }}
            </a>
        </h6>
        <p class="text-muted small mb-1">{{ product.category.name }}</p>
        <p class="fw-bold mb-2">{{ product.price }} TND</p>
        {% if not product.is_in_stock %}
        <span class="badge bg-secondary">{% trans "Out of stock" %}</span>
        {% endif %}
    </div>
</div>
